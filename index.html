<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stephen Henley</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Arial Black', Arial, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Lego baseplate stud grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,215,0,0.055) 2px, transparent 2px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Instruction booklet border */
    .frame {
      position: fixed;
      inset: 16px;
      border: 3px solid rgba(255, 215, 0, 0.55);
      border-radius: 12px;
      pointer-events: none;
      z-index: 10;
    }

    /* Top-left set badge */
    .badge {
      position: fixed;
      top: 32px;
      left: 32px;
      background: #7B2FBE;
      color: #FFD700;
      font-size: 0.58rem;
      font-weight: 900;
      font-family: 'Arial Black', Arial, sans-serif;
      padding: 5px 11px;
      border-radius: 4px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      z-index: 10;
      box-shadow: 0 3px 0 #4a1070, 0 6px 16px rgba(0,0,0,0.35);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      z-index: 1;
      padding: 24px;
    }

    h1 {
      color: #FFD700;
      font-size: clamp(2rem, 5.5vw, 3.6rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 3px 3px 0 #7B2FBE, 6px 6px 0 rgba(123, 47, 190, 0.28);
      text-align: center;
      line-height: 1.1;
    }

    .set-id {
      display: block;
      font-size: 0.2em;
      letter-spacing: 0.4em;
      color: rgba(255, 215, 0, 0.4);
      margin-bottom: 8px;
      text-shadow: none;
    }

    .btn {
      background: #FFD700;
      color: #1a1a2e;
      border: none;
      padding: 15px 46px;
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      cursor: pointer;
      border-radius: 6px;
      box-shadow: 0 7px 0 #b8960a, 0 12px 28px rgba(0,0,0,0.5);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }

    .btn:hover {
      transform: translateY(3px);
      box-shadow: 0 4px 0 #b8960a, 0 8px 18px rgba(0,0,0,0.5);
    }

    .btn:active {
      transform: translateY(7px);
      box-shadow: 0 0px 0 #b8960a, 0 4px 10px rgba(0,0,0,0.5);
    }

    .subtext {
      font-family: Arial, sans-serif;
      font-size: 0.67rem;
      color: rgba(255, 215, 0, 0.27);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: -16px;
    }

    /* Piece count circle badge */
    .parts {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: #FFD700;
      color: #1a1a2e;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 0 #b8960a, 0 8px 22px rgba(0,0,0,0.5);
      z-index: 10;
    }

    .parts .num {
      font-size: 1.55rem;
      font-weight: 900;
      line-height: 1;
    }

    .parts .lbl {
      font-size: 0.38rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <div class="frame"></div>
  <div class="badge">Portfolio · SH</div>

  <div class="container">

    <h1>
      <span class="set-id">Set No. SH–2024 · Designer Series</span>
      Stephen Henley
    </h1>

    <!-- Lego minifigure at a desk, drawn in SVG -->
    <svg width="304" height="200" viewBox="0 0 304 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <!-- MONITOR (right side of desk) -->
      <rect x="174" y="50" width="90" height="70" rx="5" fill="#0a0a1e"/>
      <rect x="179" y="55" width="80" height="56" rx="3" fill="#0b1428"/>
      <!-- Code on screen -->
      <rect x="183" y="61" width="34" height="3" rx="1" fill="#FFD700" opacity="0.75"/>
      <rect x="183" y="68" width="52" height="3" rx="1" fill="#7B2FBE" opacity="0.9"/>
      <rect x="183" y="75" width="24" height="3" rx="1" fill="#FFD700" opacity="0.5"/>
      <rect x="183" y="82" width="44" height="3" rx="1" fill="#4da6ff" opacity="0.75"/>
      <rect x="183" y="89" width="38" height="3" rx="1" fill="#7B2FBE" opacity="0.85"/>
      <rect x="183" y="96" width="28" height="3" rx="1" fill="#FFD700" opacity="0.55"/>
      <rect x="183" y="103" width="16" height="3" rx="1" fill="#FFD700" opacity="0.85"/>
      <!-- Blinking cursor -->
      <rect x="201" y="103" width="3" height="8" rx="0.5" fill="#FFD700" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <!-- Monitor stand -->
      <rect x="215" y="120" width="8" height="10" rx="1" fill="#080818"/>
      <rect x="207" y="129" width="24" height="5" rx="2" fill="#080818"/>

      <!-- FIGURE: upper body (drawn before desk so desk occludes hips) -->

      <!-- Head stud -->
      <circle cx="105" cy="15" r="7" fill="#FFD700" stroke="#c8a000" stroke-width="1.5"/>

      <!-- Head -->
      <rect x="85" y="19" width="40" height="38" rx="8" fill="#FFD700"/>

      <!-- Hair piece (dark, sits on top of head) -->
      <rect x="85" y="19" width="40" height="19" rx="8" fill="#1a1a2e"/>
      <rect x="85" y="31" width="40" height="9" fill="#1a1a2e"/>

      <!-- Eyes -->
      <circle cx="97"  cy="44" r="3.5" fill="#1a1a2e"/>
      <circle cx="113" cy="44" r="3.5" fill="#1a1a2e"/>
      <!-- Eye shine -->
      <circle cx="98.2"  cy="42.7" r="1.2" fill="white"/>
      <circle cx="114.2" cy="42.7" r="1.2" fill="white"/>

      <!-- Smile -->
      <path d="M 95 53 Q 105 61 115 53" stroke="#1a1a2e" stroke-width="2.2" fill="none" stroke-linecap="round"/>

      <!-- Neck -->
      <rect x="97" y="57" width="16" height="10" rx="2" fill="#FFD700"/>

      <!-- Torso -->
      <rect x="81" y="67" width="48" height="58" rx="5" fill="#7B2FBE"/>
      <!-- Torso inner panel -->
      <rect x="89" y="71" width="32" height="44" rx="3" fill="#6020a0"/>
      <!-- Shirt "code" detail -->
      <rect x="93" y="77" width="8"  height="2" rx="1" fill="#FFD700" opacity="0.55"/>
      <rect x="93" y="81" width="12" height="2" rx="1" fill="#4da6ff" opacity="0.55"/>
      <rect x="93" y="85" width="6"  height="2" rx="1" fill="#FFD700" opacity="0.45"/>

      <!-- LEFT ARM angled down toward keyboard (drawn before desk) -->
      <line x1="81" y1="81" x2="48" y2="120" stroke="#7B2FBE" stroke-width="13" stroke-linecap="round"/>

      <!-- RIGHT ARM angled toward mouse zone (drawn before desk) -->
      <line x1="129" y1="81" x2="165" y2="120" stroke="#7B2FBE" stroke-width="13" stroke-linecap="round"/>

      <!-- DESK SURFACE (occludes lower torso / hips) -->
      <rect x="10" y="122" width="284" height="14" rx="3" fill="#7B2FBE"/>
      <!-- Desk top edge highlight -->
      <rect x="10" y="122" width="284" height="3" rx="2" fill="rgba(255,215,0,0.1)"/>

      <!-- DESK LEGS -->
      <rect x="18"  y="136" width="10" height="58" rx="2" fill="#5a18a0"/>
      <rect x="276" y="136" width="10" height="58" rx="2" fill="#5a18a0"/>

      <!-- DESK FRONT PANEL -->
      <rect x="18" y="146" width="268" height="42" rx="3" fill="#6520b4"/>

      <!-- KEYBOARD (on desk surface) -->
      <rect x="26" y="117" width="104" height="10" rx="2" fill="#12122e"/>
      <!-- Key row 1 -->
      <rect x="30"  y="119" width="12" height="4" rx="1" fill="#1e1e58"/>
      <rect x="44"  y="119" width="12" height="4" rx="1" fill="#1e1e58"/>
      <rect x="58"  y="119" width="12" height="4" rx="1" fill="#1e1e58"/>
      <rect x="72"  y="119" width="12" height="4" rx="1" fill="#1e1e58"/>
      <rect x="86"  y="119" width="12" height="4" rx="1" fill="#1e1e58"/>
      <rect x="100" y="119" width="12" height="4" rx="1" fill="#1e1e58"/>
      <!-- Spacebar -->
      <rect x="42" y="124" width="60" height="2" rx="1" fill="#1e1e58"/>

      <!-- HANDS (drawn last — on top of desk and keyboard) -->
      <!-- Left hand on keyboard -->
      <circle cx="46"  cy="122" r="9" fill="#FFD700"/>
      <rect    x="40"  y="128"  width="12" height="4" rx="2" fill="#c8a000"/>
      <!-- Right hand near mouse area -->
      <circle cx="166" cy="122" r="9" fill="#FFD700"/>
      <rect    x="160" y="128"  width="12" height="4" rx="2" fill="#c8a000"/>

    </svg>

    <button class="btn">Open the Manual</button>
    <p class="subtext">Builders read the whole manual.</p>

  </div>

  <!-- Lego-style piece count badge -->
  <div class="parts" aria-label="14 Projects">
    <span class="num">14</span>
    <span class="lbl">Projects</span>
  </div>

</body>
</html>
