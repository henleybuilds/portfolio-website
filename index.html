<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stephen Henley</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #B8D4E8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Arial Black', Arial, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Dot grid — dark dots on light blue */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(28,43,74,0.12) 2px, transparent 2px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Yellow instruction-booklet border frame */
    .frame {
      position: fixed;
      inset: 16px;
      border: 3px solid rgba(255, 215, 0, 0.75);
      border-radius: 12px;
      pointer-events: none;
      z-index: 10;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      z-index: 1;
      padding: 24px;
    }

    /* Set number line above heading */
    .set-label {
      font-family: Arial, sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      color: #1C2B4A;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: -20px;
    }

    h1 {
      color: #1C2B4A;
      font-size: clamp(2rem, 5.5vw, 3.6rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 2px 2px 0 rgba(28,43,74,0.15);
      text-align: center;
      line-height: 1.1;
    }

    /* Character + speech bubble wrapper */
    .character-wrap {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0;
      position: relative;
    }

    .minifig {
      width: 140px;
      height: auto;
      display: block;
      flex-shrink: 0;
    }

    /* Speech bubble */
    .bubble {
      position: relative;
      background: #fff;
      border: 2.5px solid #1C2B4A;
      border-radius: 14px;
      padding: 14px 16px;
      max-width: 240px;
      align-self: center;
      margin-left: 18px;
      opacity: 0;
      transform: translateY(6px) scale(0.97);
      animation: bubbleIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards;
    }

    /* Tail pointing left toward the character */
    .bubble::before {
      content: '';
      position: absolute;
      left: -14px;
      top: 50%;
      transform: translateY(-50%);
      border-width: 10px 14px 10px 0;
      border-style: solid;
      border-color: transparent #1C2B4A transparent transparent;
    }
    .bubble::after {
      content: '';
      position: absolute;
      left: -10px;
      top: 50%;
      transform: translateY(-50%);
      border-width: 8px 12px 8px 0;
      border-style: solid;
      border-color: transparent #fff transparent transparent;
    }

    .bubble p {
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: #1C2B4A;
      line-height: 1.55;
    }

    @keyframes bubbleIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Yellow 3D button */
    .btn {
      background: #FFD700;
      color: #1C2B4A;
      border: none;
      padding: 15px 46px;
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      cursor: pointer;
      border-radius: 6px;
      box-shadow: 0 7px 0 #b8960a, 0 12px 28px rgba(28,43,74,0.22);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }

    .btn:hover {
      transform: translateY(3px);
      box-shadow: 0 4px 0 #b8960a, 0 8px 18px rgba(28,43,74,0.22);
    }

    .btn:active {
      transform: translateY(7px);
      box-shadow: 0 0px 0 #b8960a, 0 4px 10px rgba(28,43,74,0.22);
    }

    /* Hidden Lego brick — 2×1 with two studs */
    #brick-1 {
      position: fixed;
      bottom: 52px;
      left: 58px;
      width: 32px;
      height: 16px;
      background: #FFD700;
      border-radius: 3px;
      box-shadow: 0 3px 0 #b8960a;
      cursor: pointer;
      z-index: 5;
      opacity: 0.35;
      transition: opacity 0.2s ease;
    }

    #brick-1::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 4px;
      width: 10px;
      height: 6px;
      background: #FFD700;
      border-radius: 50% 50% 0 0;
      box-shadow: 14px 0 0 #FFD700;
    }

    #brick-1:hover {
      opacity: 0.6;
    }

    #brick-1.glow {
      opacity: 1;
      animation: brickGlow 0.7s ease forwards;
    }

    @keyframes brickGlow {
      0%   { box-shadow: 0 3px 0 #b8960a, 0 0 0 rgba(255,215,0,0); }
      40%  { box-shadow: 0 3px 0 #b8960a, 0 0 18px 8px rgba(255,215,0,0.75); }
      100% { box-shadow: 0 3px 0 #b8960a, 0 0 0 rgba(255,215,0,0); opacity: 0.35; }
    }
  </style>
</head>
<body>

  <div class="frame"></div>

  <div class="container">

    <p class="set-label">Set No. SH-001 &middot; Build Log Series</p>

    <h1>Stephen Henley</h1>

    <div class="character-wrap">
      <img
        src="assets/lego/minifig-desk.png"
        alt="Lego minifigure at a desk"
        class="minifig"
      >
      <div class="bubble">
        <p>Hey — I'm Stephen. This is my build log. 4 hidden bricks somewhere in here. Find them all and let's see what we build.</p>
      </div>
    </div>

    <button class="btn">Open the Manual</button>

  </div>

  <!-- Hidden brick #1 — tucked near the bottom-left border -->
  <div id="brick-1" title="You found something..."></div>

  <script>
    document.getElementById('brick-1').addEventListener('click', function () {
      this.classList.remove('glow');
      void this.offsetWidth; // reflow to restart animation
      this.classList.add('glow');
    });
  </script>

</body>
</html>
